name: Playwright E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Nightly full regression at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      tier:
        description: 'Test tier to run'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - sanity
          - regression
          - a11y
          - all

env:
  BASE_URL: ${{ secrets.BASE_URL || 'http://localhost:3000' }}
  TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
  TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
  TEST_TENANT_ID: ${{ secrets.TEST_TENANT_ID }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  ENVIRONMENT: ${{ secrets.ENVIRONMENT || 'staging' }}

jobs:
  # ─── Tier 0: Smoke — Every Push ──────────────────────────────────────────
  smoke:
    name: 🚀 Smoke Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npm run test:smoke -- --project=chromium --reporter=github,html

      - name: "\U0001F9F9 Clean test data"
        if: always()
        run: npm run clean:testdata

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 7

  # ─── Tier 1: Sanity — Every PR ──────────────────────────────────────────
  sanity:
    name: ✅ Sanity Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: smoke

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run sanity tests
        run: npm run test:sanity -- --project=chromium --reporter=github,html

      - name: "\U0001F9F9 Clean test data"
        if: always()
        run: npm run clean:testdata

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-report
          path: playwright-report/
          retention-days: 14

  # ─── Tier 2-3: Regression — Nightly ─────────────────────────────────────
  regression:
    name: 🔄 Full Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.tier == 'all' || github.event.inputs.tier == 'regression'

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run regression tests
        run: npm run test:regression -- --project=${{ matrix.browser }} --reporter=github,html

      - name: "\U0001F9F9 Clean test data"
        if: always()
        run: npm run clean:testdata

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 30

  # ─── A11y: Accessibility — PR + Nightly ──────────────────────────────────
  accessibility:
    name: ♿ Accessibility Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run accessibility tests
        run: npm run test:a11y -- --project=chromium --reporter=github,html

      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 14
